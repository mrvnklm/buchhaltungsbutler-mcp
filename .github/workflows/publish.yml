name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      # npm's OIDC trusted-publishing support needs npm >= 11.5.1; the npm
      # bundled with actions/setup-node's Node 22.x can lag behind that.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Authenticates via OIDC trusted publishing (configured in npm package
      # settings for this repo + workflow) -- no NPM_TOKEN secret needed.
      - name: Publish to npm
        run: npm publish --provenance --access public
