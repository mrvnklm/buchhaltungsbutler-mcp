name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # required to create the GitHub Release with the .mcpb asset
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Node 24 (not the 22.x used by the CI test matrix) specifically for
      # this job: npm's OIDC trusted-publishing needs npm >= 11.5.1, and
      # self-upgrading npm in-place via `npm install -g npm@latest` on the
      # Node 22.x GitHub Actions toolcache image hit a known broken-module-tree
      # bug (missing `sigstore`, actions/runner-images#13883). Node 24's
      # toolcache ships a recent-enough npm already, so no self-upgrade needed.
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Runs before publishing so a packaging failure blocks the (irreversible)
      # npm publish step below, instead of leaving a published package with no
      # matching GitHub Release.
      - name: Build .mcpb extension
        run: npm run build:mcpb

      # Authenticates via OIDC trusted publishing (configured in npm package
      # settings for this repo + workflow) -- no NPM_TOKEN secret needed.
      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            buchhaltungsbutler-mcp.mcpb
